
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SOMA-ID PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#020617', // Navy Blue Profundo
              surface: '#0F172A',    // Navy Blue Médio
              border: '#1E293B',
              accent: '#3B82F6',     // Precision Blue
              muted: '#64748b'
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace']
            }
          }
        }
      }
    </script>
    <style>
      body { background-color: #020617; color: #F8FAFC; font-family: 'Inter', sans-serif; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #3B82F6; }
      .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); }
      @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
    </style>

    "jspdf": "https://esm.sh/jspdf@2.5.1"
  }
}
</script>

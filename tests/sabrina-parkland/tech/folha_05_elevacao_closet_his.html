<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMA ID - Folha 05 - Elevação Closet His</title>
<style>
  @page { size: A2 landscape; margin: 0; }
  body {
    margin: 0; padding: 20px;
    background: #2a2a2a;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
  }
  .sheet {
    background: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    display: inline-block;
  }
  svg { display: block; }
  @media print {
    body { background: #fff; padding: 0; }
    .sheet { box-shadow: none; }
  }
</style>
</head>
<body>
<div class="sheet">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5940 4200" width="1188" height="840"
     style="font-family: Arial, Helvetica, sans-serif;">

<!-- ============================================================ -->
<!-- DEFINITIONS                                                    -->
<!-- ============================================================ -->
<defs>
  <!-- Dimension arrowheads -->
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0,0 8,3 0,6" fill="#000"/>
  </marker>
  <marker id="arrowR" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
    <polygon points="8,0 0,3 8,6" fill="#000"/>
  </marker>
  <!-- Dot marker for leader lines -->
  <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
    <circle cx="3" cy="3" r="2.5" fill="#000"/>
  </marker>
  <!-- MDP hatch pattern (45 degree) -->
  <pattern id="hatchMDP" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="12" stroke="#999" stroke-width="0.7"/>
  </pattern>
  <!-- MDP Lana fill -->
  <pattern id="mdpLana" patternUnits="userSpaceOnUse" width="16" height="16">
    <rect width="16" height="16" fill="#e8ddd0"/>
    <line x1="0" y1="8" x2="16" y2="8" stroke="#d4c8b8" stroke-width="0.4"/>
  </pattern>
  <!-- MDF back panel pattern -->
  <pattern id="mdfBack" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="8" stroke="#bbb" stroke-width="0.4"/>
  </pattern>
  <!-- Section hatch -->
  <pattern id="sectionHatch" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#666" stroke-width="0.8"/>
  </pattern>
</defs>

<!-- ============================================================ -->
<!-- SHEET BORDER                                                   -->
<!-- ============================================================ -->
<rect x="0" y="0" width="5940" height="4200" fill="#ffffff" stroke="#000" stroke-width="8"/>
<rect x="40" y="40" width="5860" height="4120" fill="none" stroke="#000" stroke-width="4"/>

<!-- ============================================================ -->
<!-- DRAWING TITLE                                                  -->
<!-- ============================================================ -->
<text x="2970" y="130" text-anchor="middle" font-size="60" font-weight="bold" fill="#000">ELEVACAO CLOSET HIS - PAREDE OESTE</text>
<text x="2970" y="175" text-anchor="middle" font-size="36" fill="#444">Vista Frontal  |  Escala 1:20  |  Cotas em milimetros</text>
<line x1="40" y1="200" x2="5900" y2="200" stroke="#000" stroke-width="3"/>

<!-- ============================================================ -->
<!-- SCALE CALCULATIONS                                             -->
<!-- Scale 1:20 → 1mm real = 0.5 viewBox units (10x factor / 20)  -->
<!-- Actually: viewBox units = real mm / 20 * 10 = real mm / 2     -->
<!-- So 4030mm = 2015 vbu, 2400mm = 1200 vbu, 600mm = 300 vbu     -->
<!-- Front elevation origin: left=600, bottom (floor)=3400         -->
<!-- ============================================================ -->

<!-- Drawing area constants -->
<!-- FRONT VIEW: origin X=600, floor Y=3400, ceiling Y=3400-1200=2200 -->
<!-- Module widths: 800/2=400, 800/2=400, 1200/2=600, 1230/2=615 -->
<!-- Total: 400+400+600+615 = 2015 vbu -->

<!-- ============================================================ -->
<!-- FRONT ELEVATION - MAIN VIEW                                    -->
<!-- ============================================================ -->

<!-- Floor line -->
<line x1="450" y1="3400" x2="2850" y2="3400" stroke="#000" stroke-width="7"/>
<text x="470" y="3445" font-size="24" fill="#666">N.P.A. +0.00</text>

<!-- Ceiling reference line -->
<line x1="450" y1="2200" x2="2850" y2="2200" stroke="#000" stroke-width="3" stroke-dasharray="20,10"/>
<text x="470" y="2185" font-size="22" fill="#666">FORRO h=2400</text>

<!-- Wall behind (light gray) -->
<rect x="600" y="2200" width="2015" height="1200" fill="#f5f5f5" stroke="none"/>

<!-- ============================================================ -->
<!-- MODULE 1 - PRATELEIRAS 1 (x=600, w=400)                      -->
<!-- ============================================================ -->
<g id="mod1">
  <!-- Left side panel 18mm = 9vbu -->
  <rect x="600" y="2200" width="9" height="1200" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Right side panel -->
  <rect x="991" y="2200" width="9" height="1200" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Top panel -->
  <rect x="600" y="2200" width="400" height="9" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Bottom panel -->
  <rect x="600" y="3391" width="400" height="9" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>

  <!-- Back panel (dashed) -->
  <rect x="609" y="2209" width="382" height="1182" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="12,6"/>

  <!-- 6 shelves evenly spaced: internal height = 1200-18 = 1182vbu / 2 = ~591 real spacing -->
  <!-- 2400-36=2364mm internal, 6 shelves create 7 spaces -->
  <!-- 6 shelves in 2364mm: spacing = 2364/7 = ~338mm = 169vbu between shelves -->
  <!-- Shelf positions from bottom panel (y=3391): every 169 vbu upward -->
  <!-- shelf y = 3391 - n*169, shelf thickness 9vbu (18mm) -->

  <!-- Shelf 1 -->
  <rect x="609" y="3222" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>
  <!-- Shelf 2 -->
  <rect x="609" y="3053" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>
  <!-- Shelf 3 -->
  <rect x="609" y="2884" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>
  <!-- Shelf 4 -->
  <rect x="609" y="2715" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>
  <!-- Shelf 5 -->
  <rect x="609" y="2546" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>
  <!-- Shelf 6 -->
  <rect x="609" y="2377" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>

  <!-- Module label -->
  <text x="800" y="2165" text-anchor="middle" font-size="30" font-weight="bold" fill="#000">MOD 1</text>
  <text x="800" y="2195" text-anchor="middle" font-size="22" fill="#444">PRATELEIRAS 1</text>
</g>

<!-- ============================================================ -->
<!-- MODULE 2 - PRATELEIRAS 2 (x=1000, w=400)                    -->
<!-- ============================================================ -->
<g id="mod2">
  <!-- Shared left panel with Mod 1 right panel at x=1000 -->
  <!-- Left side panel -->
  <rect x="1000" y="2200" width="9" height="1200" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Right side panel -->
  <rect x="1391" y="2200" width="9" height="1200" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Top panel -->
  <rect x="1000" y="2200" width="400" height="9" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Bottom panel -->
  <rect x="1000" y="3391" width="400" height="9" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>

  <!-- Back panel (dashed) -->
  <rect x="1009" y="2209" width="382" height="1182" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="12,6"/>

  <!-- 6 shelves -->
  <rect x="1009" y="3222" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>
  <rect x="1009" y="3053" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>
  <rect x="1009" y="2884" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>
  <rect x="1009" y="2715" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>
  <rect x="1009" y="2546" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>
  <rect x="1009" y="2377" width="382" height="9" fill="url(#mdpLana)" stroke="#000" stroke-width="3.5"/>

  <!-- Module label -->
  <text x="1200" y="2165" text-anchor="middle" font-size="30" font-weight="bold" fill="#000">MOD 2</text>
  <text x="1200" y="2195" text-anchor="middle" font-size="22" fill="#444">PRATELEIRAS 2</text>
</g>

<!-- ============================================================ -->
<!-- MODULE 3 - CABIDE / HANGING (x=1400, w=600)                  -->
<!-- ============================================================ -->
<g id="mod3">
  <!-- Left side panel -->
  <rect x="1400" y="2200" width="9" height="1200" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Right side panel -->
  <rect x="1991" y="2200" width="9" height="1200" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Top panel -->
  <rect x="1400" y="2200" width="600" height="9" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Bottom panel -->
  <rect x="1400" y="3391" width="600" height="9" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>

  <!-- Back panel (dashed) -->
  <rect x="1409" y="2209" width="582" height="1182" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="12,6"/>

  <!-- Hanging bar at 1700mm from floor = 850vbu from floor -->
  <!-- Bar Y = 3400 - 850 = 2550 -->
  <!-- Bar shown as circle (sectioned), diameter 25mm = 12.5vbu -->
  <!-- Bar center at Y=2550, X centered in module -->
  <!-- Bar endpoints: x=1409 to x=1991, center line -->
  <line x1="1409" y1="2550" x2="1991" y2="2550" stroke="#000" stroke-width="3.5" stroke-dasharray="6,4"/>

  <!-- Bar cross-section circle left end -->
  <circle cx="1420" cy="2550" r="6.25" fill="none" stroke="#000" stroke-width="3.5"/>
  <line x1="1416" y1="2550" x2="1424" y2="2550" stroke="#000" stroke-width="2"/>
  <line x1="1420" y1="2546" x2="1420" y2="2554" stroke="#000" stroke-width="2"/>

  <!-- Bar cross-section circle right end -->
  <circle cx="1980" cy="2550" r="6.25" fill="none" stroke="#000" stroke-width="3.5"/>
  <line x1="1976" y1="2550" x2="1984" y2="2550" stroke="#000" stroke-width="2"/>
  <line x1="1980" y1="2546" x2="1980" y2="2554" stroke="#000" stroke-width="2"/>

  <!-- Bar front view: solid line -->
  <line x1="1420" y1="2550" x2="1980" y2="2550" stroke="#000" stroke-width="5"/>

  <!-- Bar support brackets -->
  <rect x="1409" y="2538" width="15" height="24" fill="none" stroke="#000" stroke-width="2.5"/>
  <rect x="1976" y="2538" width="15" height="24" fill="none" stroke="#000" stroke-width="2.5"/>

  <!-- Hangers indication (light) -->
  <line x1="1500" y1="2556" x2="1500" y2="2700" stroke="#aaa" stroke-width="1.5"/>
  <line x1="1600" y1="2556" x2="1600" y2="2750" stroke="#aaa" stroke-width="1.5"/>
  <line x1="1700" y1="2556" x2="1700" y2="2720" stroke="#aaa" stroke-width="1.5"/>
  <line x1="1800" y1="2556" x2="1800" y2="2690" stroke="#aaa" stroke-width="1.5"/>
  <line x1="1900" y1="2556" x2="1900" y2="2740" stroke="#aaa" stroke-width="1.5"/>

  <!-- Chrome bar label -->
  <text x="1700" y="2520" text-anchor="middle" font-size="20" fill="#444">BARRA CROMADA dia.25</text>

  <!-- Module label -->
  <text x="1700" y="2165" text-anchor="middle" font-size="30" font-weight="bold" fill="#000">MOD 3</text>
  <text x="1700" y="2195" text-anchor="middle" font-size="22" fill="#444">CABIDE</text>
</g>

<!-- ============================================================ -->
<!-- MODULE 4 - SAPATEIRA (x=2000, w=615)                         -->
<!-- ============================================================ -->
<g id="mod4">
  <!-- Left side panel -->
  <rect x="2000" y="2200" width="9" height="1200" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Right side panel -->
  <rect x="2606" y="2200" width="9" height="1200" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Top panel -->
  <rect x="2000" y="2200" width="615" height="9" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>
  <!-- Bottom panel -->
  <rect x="2000" y="3391" width="615" height="9" fill="url(#hatchMDP)" stroke="#000" stroke-width="7"/>

  <!-- Back panel (dashed) -->
  <rect x="2009" y="2209" width="597" height="1182" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="12,6"/>

  <!-- 8 angled shoe shelves at 15 degrees -->
  <!-- Internal height: 1182vbu, spacing 1182/9 = ~131 vbu -->
  <!-- Each shelf is tilted 15 degrees: shelf width ~597vbu, angle creates a visual tilt -->
  <!-- Shelf front edge lower than back edge by sin(15)*depth -->
  <!-- For visual: shelf_left_y = base_y, shelf_right_y = base_y (shown as angled line) -->
  <!-- Shelf depth in front view = we show the front lip -->

  <!-- Shoe shelf 1 (bottom) -->
  <line x1="2009" y1="3260" x2="2606" y2="3260" stroke="#000" stroke-width="3.5"/>
  <line x1="2009" y1="3260" x2="2009" y2="3230" stroke="#000" stroke-width="2.5"/>
  <line x1="2009" y1="3230" x2="2606" y2="3230" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>
  <!-- Angled shelf representation: front lip + angled surface -->
  <line x1="2020" y1="3260" x2="2020" y2="3235" stroke="#000" stroke-width="2" transform="rotate(-15,2020,3260)"/>
  <line x1="2200" y1="3260" x2="2200" y2="3235" stroke="#000" stroke-width="2" transform="rotate(-15,2200,3260)"/>
  <line x1="2400" y1="3260" x2="2400" y2="3235" stroke="#000" stroke-width="2" transform="rotate(-15,2400,3260)"/>
  <line x1="2595" y1="3260" x2="2595" y2="3235" stroke="#000" stroke-width="2" transform="rotate(-15,2595,3260)"/>

  <!-- Shoe shelf 2 -->
  <line x1="2009" y1="3128" x2="2606" y2="3128" stroke="#000" stroke-width="3.5"/>
  <line x1="2009" y1="3128" x2="2009" y2="3098" stroke="#000" stroke-width="2.5"/>
  <line x1="2009" y1="3098" x2="2606" y2="3098" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Shoe shelf 3 -->
  <line x1="2009" y1="2996" x2="2606" y2="2996" stroke="#000" stroke-width="3.5"/>
  <line x1="2009" y1="2996" x2="2009" y2="2966" stroke="#000" stroke-width="2.5"/>
  <line x1="2009" y1="2966" x2="2606" y2="2966" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Shoe shelf 4 -->
  <line x1="2009" y1="2864" x2="2606" y2="2864" stroke="#000" stroke-width="3.5"/>
  <line x1="2009" y1="2864" x2="2009" y2="2834" stroke="#000" stroke-width="2.5"/>
  <line x1="2009" y1="2834" x2="2606" y2="2834" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Shoe shelf 5 -->
  <line x1="2009" y1="2732" x2="2606" y2="2732" stroke="#000" stroke-width="3.5"/>
  <line x1="2009" y1="2732" x2="2009" y2="2702" stroke="#000" stroke-width="2.5"/>
  <line x1="2009" y1="2702" x2="2606" y2="2702" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Shoe shelf 6 -->
  <line x1="2009" y1="2600" x2="2606" y2="2600" stroke="#000" stroke-width="3.5"/>
  <line x1="2009" y1="2600" x2="2009" y2="2570" stroke="#000" stroke-width="2.5"/>
  <line x1="2009" y1="2570" x2="2606" y2="2570" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Shoe shelf 7 -->
  <line x1="2009" y1="2468" x2="2606" y2="2468" stroke="#000" stroke-width="3.5"/>
  <line x1="2009" y1="2468" x2="2009" y2="2438" stroke="#000" stroke-width="2.5"/>
  <line x1="2009" y1="2438" x2="2606" y2="2438" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Shoe shelf 8 -->
  <line x1="2009" y1="2336" x2="2606" y2="2336" stroke="#000" stroke-width="3.5"/>
  <line x1="2009" y1="2336" x2="2009" y2="2306" stroke="#000" stroke-width="2.5"/>
  <line x1="2009" y1="2306" x2="2606" y2="2306" stroke="#aaa" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Angled shelf visual indicators (15 degree tilt lines on each shelf) -->
  <!-- Show angled surface on a couple of shelves for clarity -->
  <g opacity="0.6">
    <!-- Shelf 1 angled surface -->
    <line x1="2030" y1="3260" x2="2070" y2="3230" stroke="#000" stroke-width="1.5"/>
    <line x1="2150" y1="3260" x2="2190" y2="3230" stroke="#000" stroke-width="1.5"/>
    <line x1="2300" y1="3260" x2="2340" y2="3230" stroke="#000" stroke-width="1.5"/>
    <line x1="2450" y1="3260" x2="2490" y2="3230" stroke="#000" stroke-width="1.5"/>
    <!-- Shelf 3 angled surface -->
    <line x1="2030" y1="2996" x2="2070" y2="2966" stroke="#000" stroke-width="1.5"/>
    <line x1="2150" y1="2996" x2="2190" y2="2966" stroke="#000" stroke-width="1.5"/>
    <line x1="2300" y1="2996" x2="2340" y2="2966" stroke="#000" stroke-width="1.5"/>
    <line x1="2450" y1="2996" x2="2490" y2="2966" stroke="#000" stroke-width="1.5"/>
    <!-- Shelf 5 angled surface -->
    <line x1="2030" y1="2732" x2="2070" y2="2702" stroke="#000" stroke-width="1.5"/>
    <line x1="2150" y1="2732" x2="2190" y2="2702" stroke="#000" stroke-width="1.5"/>
    <line x1="2300" y1="2732" x2="2340" y2="2702" stroke="#000" stroke-width="1.5"/>
    <line x1="2450" y1="2732" x2="2490" y2="2702" stroke="#000" stroke-width="1.5"/>
    <!-- Shelf 7 angled surface -->
    <line x1="2030" y1="2468" x2="2070" y2="2438" stroke="#000" stroke-width="1.5"/>
    <line x1="2150" y1="2468" x2="2190" y2="2438" stroke="#000" stroke-width="1.5"/>
    <line x1="2300" y1="2468" x2="2340" y2="2438" stroke="#000" stroke-width="1.5"/>
    <line x1="2450" y1="2468" x2="2490" y2="2438" stroke="#000" stroke-width="1.5"/>
  </g>

  <!-- 15 degree angle annotation -->
  <line x1="2550" y1="3260" x2="2590" y2="3230" stroke="#c00" stroke-width="2"/>
  <text x="2598" y="3250" font-size="18" fill="#c00">15°</text>

  <!-- Module label -->
  <text x="2308" y="2165" text-anchor="middle" font-size="30" font-weight="bold" fill="#000">MOD 4</text>
  <text x="2308" y="2195" text-anchor="middle" font-size="22" fill="#444">SAPATEIRA</text>
</g>

<!-- ============================================================ -->
<!-- DIMENSION LINES - HORIZONTAL (WIDTH)                          -->
<!-- ============================================================ -->

<!-- Overall width dimension: 4030mm (unfolded from 2540mm wall) -->
<!-- Dimension line at Y=3550 (below floor) -->
<line x1="600" y1="3410" x2="600" y2="3600" stroke="#000" stroke-width="2"/>
<line x1="2615" y1="3410" x2="2615" y2="3600" stroke="#000" stroke-width="2"/>
<line x1="600" y1="3580" x2="2615" y2="3580" stroke="#000" stroke-width="3.5" marker-start="url(#arrowR)" marker-end="url(#arrow)"/>
<text x="1607" y="3570" text-anchor="middle" font-size="28" font-weight="bold" fill="#000">4030 (desdobrado)</text>

<!-- Module 1 width: 800mm -->
<line x1="600" y1="3490" x2="1000" y2="3490" stroke="#000" stroke-width="3.5" marker-start="url(#arrowR)" marker-end="url(#arrow)"/>
<text x="800" y="3480" text-anchor="middle" font-size="26" fill="#000">800</text>
<line x1="1000" y1="3410" x2="1000" y2="3510" stroke="#000" stroke-width="2"/>

<!-- Module 2 width: 800mm -->
<line x1="1000" y1="3490" x2="1400" y2="3490" stroke="#000" stroke-width="3.5" marker-start="url(#arrowR)" marker-end="url(#arrow)"/>
<text x="1200" y="3480" text-anchor="middle" font-size="26" fill="#000">800</text>
<line x1="1400" y1="3410" x2="1400" y2="3510" stroke="#000" stroke-width="2"/>

<!-- Module 3 width: 1200mm -->
<line x1="1400" y1="3490" x2="2000" y2="3490" stroke="#000" stroke-width="3.5" marker-start="url(#arrowR)" marker-end="url(#arrow)"/>
<text x="1700" y="3480" text-anchor="middle" font-size="26" fill="#000">1200</text>
<line x1="2000" y1="3410" x2="2000" y2="3510" stroke="#000" stroke-width="2"/>

<!-- Module 4 width: 1230mm -->
<line x1="2000" y1="3490" x2="2615" y2="3490" stroke="#000" stroke-width="3.5" marker-start="url(#arrowR)" marker-end="url(#arrow)"/>
<text x="2308" y="3480" text-anchor="middle" font-size="26" fill="#000">1230</text>
<line x1="2615" y1="3410" x2="2615" y2="3510" stroke="#000" stroke-width="2"/>

<!-- ============================================================ -->
<!-- DIMENSION LINES - VERTICAL (HEIGHT) - LEFT SIDE               -->
<!-- ============================================================ -->

<!-- Overall height: 2400mm -->
<line x1="590" y1="2200" x2="440" y2="2200" stroke="#000" stroke-width="2"/>
<line x1="590" y1="3400" x2="440" y2="3400" stroke="#000" stroke-width="2"/>
<line x1="460" y1="2200" x2="460" y2="3400" stroke="#000" stroke-width="3.5" marker-start="url(#arrowR)" marker-end="url(#arrow)"/>
<text x="450" y="2820" text-anchor="middle" font-size="28" font-weight="bold" fill="#000" transform="rotate(-90,450,2820)">2400</text>

<!-- Shelf spacing dimension (Module 1, right side) -->
<!-- Show one representative spacing: between bottom panel and shelf 1 -->

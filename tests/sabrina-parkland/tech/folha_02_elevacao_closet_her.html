<body>
<div class="sheet">

<!-- ============================================================ -->
<!-- DEFINITIONS                                                    -->
<!-- ============================================================ -->
<defs>

  </pattern>
  <!-- LED symbol -->
  <pattern id="ledZigzag" patternUnits="userSpaceOnUse" width="20" height="6">
    <polyline points="0,3 5,0 10,6 15,0 20,3" fill="none" stroke="#E8A800" stroke-width="1"/>
  </pattern>
</defs>

<!-- ============================================================ -->
<!-- BACKGROUND & BORDER                                            -->
<!-- ============================================================ -->

<!-- DRAWING TITLE                                                  -->

<!-- ============================================================ -->
<!-- COORDINATE SYSTEM                                              -->
<!-- Scale: 1:20, but on SVG we use 1mm = ~1 unit at viewBox       -->
<!-- Drawing area: origin at (350, 3400) = floor level left edge    -->
<!-- Y grows upward in real, but SVG Y goes down.                   -->
<!-- Convention: floor at SVG y=3400, ceiling at y=3400-3000/k      -->
<!-- Using scale factor k where 1mm real = 0.8 SVG units            -->
<!-- Total wall: 9520mm real => 9520*0.8 = 7616 too wide             -->
<!-- Let's use scale: 1mm = 0.55 SVG units to fit drawing area      -->
<!-- Wall 9640mm wide => 5302 SVG. Height 3000mm => 1650 SVG        -->
<!-- Drawing origin: left=300, floor_y=3350                         -->
<!-- ============================================================ -->

<!--
  LAYOUT PLAN (left to right, total ~9640mm wall):
  1. Steamer Niche: 300mm
  2. Long Hanging: 1500mm
  3. Double Hanging: 2000mm
  4. Shelves: 800mm
  5. Shoe Rack: 1500mm (regular)
  6. Boot Rack: 1050mm (boots above regular)
  7. Vitrines: 1050mm
  8. Luggage overhead spans sections 2-3 (2000mm wide at top)

  Rearranged for better composition:
  Steamer(300) + LongHang(1500) + DoubleHang(2000) + Shelves(800) + Shoes(1500) + Vitrines(1050) + Boots area integrated
  Total: 300+1500+2000+800+1500+1050 = 7150mm
  With 18mm dividers between sections (5 dividers): 7150+90 = 7240mm

  Scale: 1mm real = 0.6 SVG units
  Origin: x_origin=350, floor_y=3350
-->

<g id="elevation" transform="translate(0,0)">

<!-- Floor reference line -->
<line x1="250" y1="3350" x2="5050" y2="3350" stroke="#000" stroke-width="2" stroke-dasharray="20,5,5,5"/>
<text x="200" y="3365" text-anchor="end" font-size="22" fill="#000">0</text>

<!-- Ceiling line at 3000mm => y = 3350 - 3000*0.6 = 3350-1800 = 1550 -->
<line x1="250" y1="1550" x2="5050" y2="1550" stroke="#000" stroke-width="1" stroke-dasharray="15,5"/>
<text x="200" y="1565" text-anchor="end" font-size="22" fill="#000">3000</text>

<!-- Furniture top at 2400mm => y = 3350 - 2400*0.6 = 3350-1440 = 1910 -->

<!-- ============================================================ -->
<!-- Scale factor: s=0.6  Origin: ox=350, oy=3350 (floor)          -->
<!-- Real x => SVG: ox + x*s    Real y(from floor) => SVG: oy - y*s -->
<!-- ============================================================ -->

<!--
  SECTION POSITIONS (x in mm from left edge):
  A: Steamer Niche: 0 to 300
  B: Long Hanging: 318 to 1818 (300+18 divider)
  C: Double Hanging: 1836 to 3836 (1818+18)
  D: Shelves: 3854 to 4654 (3836+18)
  E: Shoe Rack: 4672 to 6172 (4654+18)
  F: Vitrines (bags): 6190 to 7240 (6172+18, width 1050)

  But this totals 7240mm which at 0.6 scale = 4344 SVG units.
  With origin at 350, right edge at 4694. Fits in viewBox.
-->

<!-- Helper: s=0.6, ox=350, oy=3350 -->
<!-- Macro: x(mm) = 350 + mm*0.6,  y(mm) = 3350 - mm*0.6 -->

<!-- ============================================================ -->
<!-- SECTION A: STEAMER NICHE (0-300mm wide, 0-1800mm tall)        -->
<!-- ============================================================ -->
<g id="steamerNiche">
  <!-- Outer box: 300w x 1800h -->
  <!-- left=350, right=350+180=530, bottom=3350, top=3350-1080=2270 -->
  <rect x="350" y="2270" width="180" height="1080" fill="url(#hatchMDP)" stroke="#000" stroke-width="2"/>

  <!-- Side panels 18mm thick -->
  <rect x="350" y="2270" width="10.8" height="1080" fill="#D4C5A9" stroke="#000" stroke-width="1"/>
  <rect x="519.2" y="2270" width="10.8" height="1080" fill="#D4C5A9" stroke="#000" stroke-width="1"/>
  <!-- Top panel -->
  <rect x="350" y="2270" width="180" height="10.8" fill="#D4C5A9" stroke="#000" stroke-width="1"/>
  <!-- Back panel thin -->
  <rect x="355" y="2275" width="170" height="1070" fill="none" stroke="#666" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Label -->
  <text x="440" y="2800" text-anchor="middle" font-size="18" fill="#000" transform="rotate(-90,440,2800)">STEAMER</text>
  <text x="440" y="2750" text-anchor="middle" font-size="14" fill="#555" transform="rotate(-90,440,2750)">300x400x1800</text>
</g>

<!-- ============================================================ -->
<!-- SECTION B: LONG HANGING (318-1818mm, bar at 1700mm)           -->
<!-- ============================================================ -->
<g id="longHanging">
  <!-- x: 350+318*0.6=540.8 to 350+1818*0.6=1440.8 -->
  <!-- Divider at 318mm: x=540.8, 18mm wide=10.8 -->
  <rect x="540.8" y="1910" width="10.8" height="1440" fill="#D4C5A9" stroke="#000" stroke-width="1"/>

  <!-- Top panel at 2400mm -->
  <rect x="540.8" y="1910" width="900" height="10.8" fill="#D4C5A9" stroke="#000" stroke-width="1"/>

  <!-- Right divider at 1818mm -->
  <rect x="1440.8" y="1910" width="10.8" height="1440" fill="#D4C5A9" stroke="#000" stroke-width="1"/>

  <!-- Hanging bar at 1700mm height: y = 3350-1700*0.6 = 3350-1020 = 2330 -->
  <!-- Bar shown as circle (section view) 25mm dia = 15 SVG -->
  <!-- Bar position: center of section -->
  <line x1="565" y1="2330" x2="1430" y2="2330" stroke="#888" stroke-width="1" stroke-dasharray="8,4"/>
  <circle cx="565" cy="2330" r="7.5" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="1430" cy="2330" r="7.5" fill="none" stroke="#000" stroke-width="1.5"/>
  <!-- Bar center line -->
  <circle cx="565" cy="2330" r="1.5" fill="#000"/>
  <circle cx="1430" cy="2330" r="1.5" fill="#000"/>

  <!-- Hanger silhouettes (decorative indication) -->
  <g stroke="#bbb" stroke-width="0.8" fill="none">
    <path d="M700,2330 L700,2315 C700,2295 720,2280 740,2295 L740,2330"/>
    <path d="M850,2330 L850,2315 C850,2295 870,2280 890,2295 L890,2330"/>
    <path d="M1000,2330 L1000,2315 C1000,2295 1020,2280 1040,2295 L1040,2330"/>
    <path d="M1150,2330 L1150,2315 C1150,2295 1170,2280 1190,2295 L1190,2330"/>
  </g>
  <!-- Long garment lines -->
  <g stroke="#ccc" stroke-width="0.5">
    <line x1="720" y1="2340" x2="710" y2="3340"/>
    <line x1="740" y1="2340" x2="750" y2="3340"/>
    <line x1="870" y1="2340" x2="860" y2="3340"/>
    <line x1="890" y1="2340" x2="900" y2="3340"/>
    <line x1="1020" y1="2340" x2="1010" y2="3340"/>
    <line x1="1040" y1="2340" x2="1050" y2="3340"/>
  </g>

  <!-- Label -->
  <text x="998" y="2200" text-anchor="middle" font-size="22" fill="#000">CABIDEIRO LONGO</text>
  <text x="998" y="2225" text-anchor="middle" font-size="16" fill="#555">Barra cromada o/25mm</text>
  <text x="998" y="2250" text-anchor="middle" font-size="16" fill="#555">Vestidos / Casacos</text>
</g>

<!-- ============================================================ -->
<!-- LUGGAGE AREA (top of Long+Double Hanging sections)            -->
<!-- Shelf at 2000mm, width 2000mm, over sections B+C partially    -->
<!-- ============================================================ -->
<g id="luggageArea">
  <!-- 2000mm height => y = 3350-2000*0.6 = 3350-1200 = 2150 -->
  <!-- Positioned above long hanging start: x from 540.8 -->
  <!-- 2000mm wide = 1200 SVG -->
  <!-- Shelf -->
  <rect x="551.6" y="2150" width="1200" height="10.8" fill="#D4C5A9" stroke="#000" stroke-width="1"/>
  <!-- Divider in middle: at 1000mm from start -->
  <rect x="1145" y="1920.8" width="10.8" height="229.2" fill="#D4C5A9" stroke="#000" stroke-width="1"/>

  <!-- Suitcase outlines -->
  <g fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="5,3">
    <!-- Large suitcase 1 -->
    <rect x="570" y="1930" width="240" height="215" rx="5"/>
    <!-- Large suitcase 2 -->
    <rect x="830" y="1930" width="240" height="215" rx="5"/>
    <!-- Small suitcase 1 -->
    <rect x="1165" y="1950" width="150" height="195" rx="5"/>
    <!-- Small suitcase 2 -->
    <rect x="1340" y="1950" width="150" height="195" rx="5"/>
  </g>

  <text x="1151" y="2020" text-anchor="middle" font-size="18" fill="#666">MALAS / LUGGAGE</text>
  <text x="1151" y="2040" text-anchor="middle" font-size="14" fill="#888">2 grandes + 2 pequenas</text>
</g>

<!-- ============================================================ -->
<!-- SECTION C: DOUBLE HANGING (1836-3836mm)                       -->
<!-- x: 350+1836*0.6=1451.6 to 350+3836*0.6=2651.6               -->
<!-- ============================================================ -->
<g id="doubleHanging">
  <!-- Left divider already placed at 1440.8+10.8=1451.6 -->

  <!-- Top panel -->
  <rect x="1451.6" y="1910" width="1200" height="10.8" fill="#D4C5A9" stroke="#000" stroke-width="1"/>

  <!-- Right divider at 3836mm -->
  <rect x="2651.6" y="1910" width="10.8" height="1440" fill="#D4C5A9" stroke="#000" stroke-width="1"/>

  <!-- Upper bar at 1700mm: y=2330 -->
  <line x1="1470" y1="2330" x2="2640" y2="2330" stroke="#888" stroke-width="1" stroke-dasharray="8,4"/>
  <circle cx="1470" cy="2330" r="7.5" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="2640" cy="2330" r="7.5" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="1470" cy="2330" r="1.5" fill="#000"/>
  <circle cx="2640" cy="2330" r="1.5" fill="#000"/>

  <!-- Lower bar at 900mm: y = 3350-900*0.6 = 3350-540 = 2810 -->
  <line x1="1470" y1="2810" x2="2640" y2="2810" stroke="#888" stroke-width="1" stroke-dasharray="8,4"/>
  <circle cx="1470" cy="2810" r="7.5" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="2640" cy="2810" r="7.5" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="1470" cy="2810" r="1.5" fill="#000"/>
  <circle cx="2640" cy="2810" r="1.5" fill="#000"/>

  <!-- Hanger silhouettes upper -->
  <g stroke="#bbb" stroke-width="0.8" fill="none">
    <path d="M1600,2330 L1600,2315 C1600,2295 1620,2280 1640,2295 L1640,2330"/>
    <path d="M1800,2330 L1800,2315 C1800,2295 1820,2280 1840,2295 L1840,2330"/>

    <line x1="1640" y1="2340" x2="1645" y2="2790"/>
    <line x1="1820" y1="2340" x2="1815" y2="2790"/>
    <line x1="1840" y1="2340" x2="1845" y2="2790"/>
    <line x1="2020" y1="2340" x2="2015" y2="2790"/>
    <line x1="2040" y1="2340" x2="2045" y2="2790"/>
    <line x1="2220" y1="2340" x2="2215" y2="2790"/>
    <line x1="2240" y1="2340" x2="2245" y2="2790"/>
  </g>

  <!-- Hanger silhouettes lower -->
  <g stroke="#bbb" stroke-width="0.8" fill="none">
    <path d="M1600,2810 L1600,2795 C1600,2775 1620,2760 1640,2775 L1640,2810"/>
    <path d="M1800,2810 L1800,2795 C1800,2775 1820,2760 1840,2775 L1840,2810"/>
    <path d="M2000,2810 L2000,2795 C2000,2775 2020,2760 2040,2775 L2040,2810"/>
    <path d="M2200,2810 L2200,2795 C2200,2775 2220,2760 2240,2775 L2240,2810"/>
    <path d="M2400,2810 L2400,2795 C2400,2775 2420,2760 2440,2775 L2440,2810"/>
  </g>
  <!-- Trouser lines (lower) -->
  <g stroke="#ccc" stroke-width="0.5">
    <line x1="1620" y1="2820" x2="1618" y2="3340"/>
    <line x1="1640" y1="2820" x2="1642" y2="3340"/>
    <line x1="1820" y1="2820" x2="1818" y2="3340"/>
    <line x1="1840" y1="2820" x2="1842" y2="3340"/>
    <line x1="2020" y1="2820" x2="2018" y2="3340"/>
    <line x1="2040" y1="2820" x2="2042" y2="3340"/>
  </g>

  <!-- Labels -->
  <text x="2055" y="2200" text-anchor="middle" font-size="22" fill="#000">CABIDEIRO DUPLO</text>
  <text x="2055" y="2480" text-anchor="middle" font-size="16" fill="#555">Superior: Camisas / Blusas</text>
  <text x="2055" y="3000" text-anchor="middle" font-size="16" fill="#555">Inferior: Calcas / Saias</text>
</g>

<!-- 7 shelves, spacing ~300mm, 6 niches 400x350x400              -->

<g id="shelves">
  <!-- Left divider at 2662.4 already (right side of double hanging) -->

  <!-- Top panel -->
  <rect x="2662.4" y="1910" width="480" height="10.8" fill="#D4C5A9" stroke="#000" stroke-width="1"/>

  <!-- Right divider -->
  <rect x="3142.4" y="1910" width="10.8" height="1440" fill="#D4C5A9" stroke="#000" stroke-width="1"/>

  <!-- 7 shelves from floor up, spacing ~300mm -->
  <!-- Shelf positions (mm from floor): 300, 600, 900, 1200, 1500, 1800, 2100 -->
  <!-- Plus bottom at 0 and top at 2400 -->

  <!-- Bottom shelf (floor level, base) -->
  <rect x="2662.4" y="3339.2" width="480" height="10.8" fill="#D4C5A9" stroke="#000" stroke-width="1"/>

  <!-- Shelf 1: 300mm => y=3350-180=3170 -->
  <rect x="2662.4" y="3170" width="480" height="10.8" fill="#D4C5A9" stroke="#000" stroke-width="1"/>

  <!-- Shelf 4: 1200mm => y=3350-720=2630 -->

  <!-- Shelf 5: 1500mm => y=3350-900=2450 -->

  <!-- Shelf 6: 1800mm => y=3350-1080=2270 -->

</g>

<!-- ============================================================ -->
<!-- SECTION E: SHOE RACK (4672-6172mm, 1500mm wide)               -->
<!-- x: 350+4672*0.6=3153.2 to 350+6172*0.6=4053.2               -->
<!-- Regular: 5 rows x 6 pairs, 150mm per row = 750mm total       -->
<!-- Boots: 2 rows x 3 pairs above, 400mm per row = 800mm         -->
<!-- Boots width: 1050mm                                            -->
<!-- ============================================================ -->
<g id="shoeRack">
  <!-- Right divider -->
  <rect x="4053.2" y="1910" width="10.8" height="1440" fill="#D4C5A9" stroke="#000" stroke-width="1"/>
  <!-- Top panel -->
  <rect x="3153.2" y="1910" width="900" height="10.8" fill="#D4C5A9" stroke="#000" stroke-width="1"/>

  <!-- REGULAR SHOES: bottom 750mm (5 rows x 150mm) -->
  <!-- Row 1: floor to 150mm => y: 3350 to 3350-90=3260 -->
  <rect x="3153.2" y="3260" width="900" height="10.8" fill="#D4C5A9" stroke="#000" stroke-width="0.8"/>
  <!-- Row 2: 150 to 300mm -->

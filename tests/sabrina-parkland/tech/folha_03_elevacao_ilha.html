<div class="sheet">

<defs>

  </pattern>
  <!-- Glass line pattern -->
  <pattern id="glasshatch" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="3" stroke="#5599CC" stroke-width="0.15"/>

  <!-- Hidden line style -->
  <style>
    .struct { stroke: #000; stroke-width: 0.7; fill: none; }
    .structf { stroke: #000; stroke-width: 0.7; }
    .thin { stroke: #000; stroke-width: 0.35; fill: none; }
    .hidden { stroke: #000; stroke-width: 0.4; fill: none; stroke-dasharray: 2,1; }
    .center { stroke: #D00; stroke-width: 0.2; fill: none; stroke-dasharray: 4,1,1,1; }
    .dim { stroke: #000; stroke-width: 0.25; fill: none; }
    .dimtxt { font-size: 3px; fill: #000; text-anchor: middle; dominant-baseline: middle; }
    .label { font-size: 2.6px; fill: #333; }
    .labelsm { font-size: 2.2px; fill: #555; }
    .title { font-size: 3.2px; fill: #000; font-weight: bold; }
    .viewtitle { font-size: 3.5px; fill: #000; font-weight: bold; text-decoration: underline; }
    .glass { stroke: #3377AA; stroke-width: 0.35; fill: url(#glasshatch); opacity: 0.6; }
    .glassstroke { stroke: #3377AA; stroke-width: 0.5; fill: none; stroke-dasharray: 3,1,0.5,1; }
    .leader { stroke: #000; stroke-width: 0.2; fill: none; }
    .drawerfront { fill: #4A4A4A; stroke: #000; stroke-width: 0.5; }
    .drawerbody { fill: #D4C5A9; stroke: #000; stroke-width: 0.35; }
    .mdplana { fill: #D4C5A9; stroke: #000; stroke-width: 0.5; }
    .mdfback { fill: #C8B898; stroke: #000; stroke-width: 0.35; }
    .handle { fill: none; stroke: #000; stroke-width: 0.6; }
  </style>
</defs>
